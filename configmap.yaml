apiVersion: v1
kind: ConfigMap
metadata:
  name: openshift-template-processor
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: openshift-template-processor
    spec:
      version: v1.0
      init:
        command: [sh, -c, 'echo "Initializing OpenShift template processor..."']
      generate:
        command: [sh, -c]
        args:
          - |
            set -e

            # Determine template source
            # Priority: 1) TEMPLATE_NAME env var (URL or local path), 2) Auto-discovery
            TEMPLATE_FILES=""

            # Check if TEMPLATE_NAME is specified (can be URL or local path)
            if [ -n "$TEMPLATE_NAME" ]; then
              if echo "$TEMPLATE_NAME" | grep -qE '^https?://'; then
                echo "Downloading remote template from: $TEMPLATE_NAME" >&2
                curl -sfL "$TEMPLATE_NAME" -o "/tmp/remote-template.yaml" || {
                  echo "Error: Failed to download template from $TEMPLATE_NAME" >&2
                  exit 1
                }
                TEMPLATE_FILES="/tmp/remote-template.yaml"
              elif [ -f "$TEMPLATE_NAME" ]; then
                TEMPLATE_FILES="$TEMPLATE_NAME"
              else
                echo "Error: Template file not found: $TEMPLATE_NAME" >&2
                exit 1
              fi
            fi

            # If TEMPLATE_NAME not specified, auto-discover all templates
            if [ -z "$TEMPLATE_FILES" ]; then
              TEMPLATE_FILES=$(find . -type f \( -name "*.yaml" -o -name "*.yml" \) \
                -exec grep -l -E "(kind.*Template|apiVersion.*template\.openshift\.io/v1)" {} \; 2>/dev/null \
                | sort -u)
            fi

            if [ -z "$TEMPLATE_FILES" ]; then
              echo "Error: No OpenShift template files found. Looking for files containing kind: Template, or set TEMPLATE_NAME env var" >&2
              exit 1
            fi

            echo "Found templates:" >&2
            echo "$TEMPLATE_FILES" | while read -r f; do echo "  $f" >&2; done

            # Build parameter list
            PARAMS=""

            # Load parameters from file if PARAM_FILE is specified
            if [ -n "$PARAM_FILE" ] && [ -f "$PARAM_FILE" ]; then
              echo "Loading parameters from file: $PARAM_FILE" >&2
              while IFS='=' read -r key value || [ -n "$key" ]; do
                [ -z "$key" ] && continue
                [ "${key#\#}" != "$key" ] && continue
                value=$(echo "$value" | sed -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//")
                if [ -n "$key" ] && [ -n "$value" ]; then
                  PARAMS="$PARAMS -p $key=$value"
                fi
              done < "$PARAM_FILE"
            fi

            # Include ArgoCD standard variables
            [ -n "$ARGOCD_APP_NAME" ] && PARAMS="$PARAMS -p APP_NAME=$ARGOCD_APP_NAME"
            [ -n "$ARGOCD_APP_NAMESPACE" ] && PARAMS="$PARAMS -p APP_NAMESPACE=$ARGOCD_APP_NAMESPACE"

            # Include plugin parameters from environment
            for VAR in $(env | cut -d= -f1 | grep -E '^[A-Z][A-Z0-9_]*$' | grep -vE '^(ARGOCD_|PATH|HOME|USER|SHELL|PWD|SHLVL|_|APP_NAME|APP_NAMESPACE|TEMPLATE_NAME|PARAM_FILE)$'); do
              eval VALUE=\$$VAR
              if [ -n "$VALUE" ]; then
                PARAMS="$PARAMS -p $VAR=$VALUE"
              fi
            done

            # Process each template
            echo "$TEMPLATE_FILES" | while read -r TEMPLATE_FILE; do
              [ -z "$TEMPLATE_FILE" ] && continue
              echo "Processing template: $TEMPLATE_FILE" >&2
              oc process --local --ignore-unknown-parameters -f "$TEMPLATE_FILE" $PARAMS -o yaml \
                | sed 's/replicas: "\(.*\)"/replicas: \1/' \
                | awk '{
                    if (/^  metadata:/) {
                      print; in_meta=1; added=0; next
                    }
                    if (in_meta && /^    annotations:/) {
                      print; print "      argocd.argoproj.io/sync-options: Validate=false"; in_meta=0; added=1; next
                    }
                    if (in_meta && /^    [a-zA-Z]/ && !added) {
                      print "    annotations:"; print "      argocd.argoproj.io/sync-options: Validate=false"; in_meta=0; added=1
                    }
                    print
                  }'
            done

      discover:
        find:
          glob: "**/template.yaml"
          command: [sh, -c, 'find . -type f \( -name "*.yaml" -o -name "*.yml" \) -exec grep -l -E "(kind.*Template|apiVersion.*template\.openshift\.io/v1)" {} \; 2>/dev/null | head -1']

